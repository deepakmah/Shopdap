minicartDropdownOpenMs=700
beforeMinicartScreenshotMs=500
beforeViewCartClickMs=200
shoppingCartPageSettleMs=900
beforeShoppingCartScreenshotMs=400
# Full cart: set Qty (TestRigor-style "Qty" paths) then click "Update Shopping Cart", then screenshot
shoppingCartQtyUpdateEnabled=true
shoppingCartQtyValue=5
beforeCartQtyInteractMs=200
beforeUpdateShoppingCartClickMs=250
afterUpdateShoppingCartWaitMs=1000

# Cart: Estimate Shipping and Tax (form#shipping-zip-form), then full-page screenshot
estimateShippingTaxEnabled=true
estShipCountryId=US
estShipRegionId=12
estShipPostcode=90210
beforeEstimateShippingInteractMs=300
beforeEstimateShippingFillMs=200
afterEstimateShippingHeaderClickMs=400
afterEstimateShippingUnhideMs=350
estimateShippingDomWaitSeconds=15
estimateShippingVisibleWaitSeconds=15
estShipAfterCountrySelectMs=800
# After zip/TAB: let Magento/KO refresh shipping & totals
estShipAfterFillWaitMs=1800
# Extra pause before full-page capture so rates UI is stable
beforeEstimateShippingFullPageScreenshotMs=2000
fullPageScreenshotSettleMs=550
fullPageScreenshotMaxWidth=3840
# Raise if cart/checkout is taller than the cap (very long order summary)
fullPageScreenshotMaxHeight=20000
# Scroll entire page before measuring height (complete page in one PNG)
fullPageScreenshotScrollStabilize=true
fullPageScreenshotScrollStepPx=550
fullPageScreenshotScrollPauseMs=100
fullPageScreenshotAfterScrollTopMs=350

# Checkout (Magento guest: cart → Proceed → email + shipping → wait for rates → screenshot). Does not place order.
checkoutFlowEnabled=true
checkoutTimeoutSeconds=60
checkoutCartPath=/checkout/cart/
checkoutAfterCartLoadMs=900
checkoutBeforeProceedClickMs=300
checkoutAfterProceedWaitMs=2000
checkoutGuestEmail=deepak.maheshwari@exinent.com
checkoutShipFirstname=deepak
checkoutShipLastname=Maheshwari
checkoutShipCompany=
checkoutShipStreet=456 S Spring Street
checkoutShipCity=Los Angeles
checkoutShipCountryId=US
checkoutShipRegionId=12
checkoutShipRegionText=California
checkoutShipPostcode=90001
checkoutShipTelephone=3105550100
checkoutAfterEmailWaitMs=800
checkoutAfterCountrySelectMs=900
# After address complete: wait for shipping methods UI, then extra settle before screenshot
checkoutShippingRatesTimeoutSeconds=50
checkoutAfterShippingRatesWaitMs=3500
checkoutAfterShippingFillWaitMs=2000

# Customer login — runs after checkout. Fields: //input[@id="email"], //input[@id="pass"]
customerLoginFlowEnabled=true
customerLoginUrl=https://www.shopdap.com/customer/account/login/
customerLoginAfterCheckoutWaitMs=600
customerLoginEmail=deepak.maheshwari@exinent.com
customerLoginPassword=Admin@123
customerLoginTimeoutSeconds=25
customerLoginPageSettleMs=500
customerLoginBeforeTypeMs=200
customerLoginBeforeSubmitMs=250

# After successful login: open homepage → home category tile (dynamic li[url]) → first product Add to Wishlist
postLoginHomepageWishlistEnabled=true
postLoginHomeCategoryUrlAttr=shopdap-sales-page
postLoginHomepageSettleMs=900
postLoginBeforeCategoryClickMs=400
postLoginAfterCategoryLoadMs=1500
