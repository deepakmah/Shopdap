# Shopdap automation — edit paths and secrets for your machine.
baseUrl=https://www.shopdap.com/
useIncognito=true
basePath=C:/Users/deepa/Documents/Automation/Shopdap

imgbbApiKey=
imgbbUpload=true
imgbbDelayMs=1200

# Every reported screenshot (homepage, YMM, finder, cart, geo popup, etc.): full scrollable page vs viewport-only
fullPageScreenshotsEnabled=true
# Chrome/Edge: use DevTools Page.captureScreenshot + captureBeyondViewport (true full page). If false, uses window resize only.
fullPageScreenshotUseCdp=true

pageLoadTimeout=30
waitPollIntervalMs=150
geoPopupTimeoutSeconds=20

ymmBrand=Audi
ymmModel=A4
ymmYear=B6 (2002-2005)
ymmEngine=1.8T
ymmTransmission=Auto (5 Speed)
ymmDrivetrain=AWD
ymmAutoSelect=true
ymmAutoSelectMode=random
ymmChosenFilterIds=brand,model,year,engine,transmission,drivetrain
ymmChosenFilterEnableSeconds=25
ymmAfterEachSelectMs=800
ymmChosenOpenPauseMs=220
ymmAfterBrandWaitMs=0
ymmAfterModelWaitMs=0
ymmAfterYearWaitMs=0
ymmAfterFindClickMs=600

randomCategoryEnabled=true
randomCategoryTimeoutSeconds=12
randomCategoryAfterClickMs=500

productFinderTimeoutSeconds=25
productFinderPostFindWaitMs=500
productFinderMinItems=1

addToCartFlowEnabled=true
addToCartMaxProductAttempts=12
addToCartPresenceCheckSeconds=8
addToCartButtonTimeoutSeconds=20
addToCartModalTimeoutSeconds=15
pdpBeforeCartButtonCheckMs=250
pdpBeforeAddToCartMs=250
# Magento configurable swatches (.swatch-opt / .swatch-option) — random pick when super_attribute still empty
pdpRandomSwatchEnabled=true
pdpBeforeSwatchScrollPauseMs=200
pdpAfterSwatchClickMs=400
pdpSwatchMaxPasses=8
pdpSettleMs=400
listingReturnSettleMs=500
afterAddToCartClickMs=500
